meters:
- name: seats
  description: Per-user monthly subscription. Business $18/seat, Business+AI $24/seat,
    Enterprise contract.
  unit: seat
  aggregation: sum
  dimensions:
  - workspace
  - plan
principles:
- name: Visibility
  description: Use Loom workspace billing reports to inventory active seats per workspace
    and plan.
- name: Allocation
  description: Allocate seats by team membership; tag enterprise contracts to the procuring
    business unit.
- name: Optimization
  description: Reclaim seats from inactive users; choose annual billing for the 17%
    discount; downgrade Business+AI seats that don't use AI features.
- name: Accountability
  description: Assign a workspace owner; review monthly seat counts against active-user
    reports.
