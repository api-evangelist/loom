description: FOCUS-aligned FinOps profile for Loom. Loom bills primarily as a per-seat
  monthly subscription across Starter (free), Business, Business + AI, and Enterprise
  tiers. Developer SDK use does not add metered API charges; cost scales with seat count
  and selected tier.
