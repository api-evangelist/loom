specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Loom
providerId: loom
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
- Productivity
- Video
- Async
- Communication
- SaaS
- Rate Limiting
- Quotas
- Throttling
description: Loom does not publish per-endpoint request-rate ceilings for its developer
  SDKs (recordSDK, embedSDK, oEmbed) or SCIM endpoint. Plan-level constraints (max video
  count and recording length on Starter) act as the primary user-facing quota.
notes: Throttling guidance is not in the public Loom developer portal at the time of
  reconciliation. SCIM endpoints follow standard SCIM 2.0 conventions; assume conservative
  per-tenant rate ceilings and use exponential backoff on 429.
sources:
- https://dev.loom.com/
- https://www.loom.com/pricing
responseCodes:
  throttled: 429
limits:
- name: Starter Video Cap
  scope: account
  metric: video
  limit: 25
  timeFrame: lifetime
  notes: Free tier hard cap on number of videos.
- name: Starter Recording Length
  scope: recording
  metric: minute
  limit: 5
  timeFrame: per-recording
  notes: Free tier maximum length per recording.
- name: SCIM Endpoint
  scope: tenant
  metric: request
  limit: not published
  notes: Apply exponential backoff with jitter on 429 responses.
- name: oEmbed Endpoint
  scope: client
  metric: request
  limit: not published
  notes: Cache embed responses where possible.
policies:
- name: Backoff Strategy
  description: Honor 429 responses with exponential backoff and jitter; honor any
    Retry-After header.
- name: Cache oEmbed Results
  description: Cache the oEmbed response for a video URL rather than re-fetching on every
    page render.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
